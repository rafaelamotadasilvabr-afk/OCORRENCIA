<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Ocorrência de Ponto</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #ececec;
      padding: 18px;
      color: #111;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
    }

    .screen-panel {
      background: #ffffff;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .screen-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .top-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      align-items: end;
      margin-bottom: 18px;
    }

    .top-actions label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .top-actions select,
    .top-actions button {
      width: 100%;
      min-height: 40px;
      border: 1px solid #cfcfcf;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      background: #fff;
    }

    .top-actions button {
      border: none;
      background: #1d4ed8;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .top-actions button.secondary {
      background: #6b7280;
    }

    .help {
      margin-top: 5px;
      font-size: 11px;
      color: #555;
      line-height: 1.35;
    }

    .form-sheet {
      width: 100%;
      max-width: 794px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #bfbfbf;
      padding: 18px 16px 22px;
    }

    .sheet-header {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 16px;
      align-items: center;
      margin-bottom: 14px;
    }

    .sheet-header img {
      width: 102px;
      height: auto;
      display: block;
      margin-left: 6px;
    }

    .sheet-title {
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      text-decoration: underline;
      margin-right: 60px;
    }

    .field-box {
      position: relative;
      border: 1px solid #000;
      padding: 16px 10px 10px;
      margin-bottom: 10px;
    }

    .field-box-title {
      position: absolute;
      top: -9px;
      left: 10px;
      background: #fff;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .line-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      align-items: end;
      margin-top: 12px;
    }

    .line-grid-3 {
      display: grid;
      grid-template-columns: auto 1fr auto 180px;
      gap: 8px;
      align-items: end;
      margin-top: 12px;
    }

    .line-grid-2 {
      display: grid;
      grid-template-columns: auto 180px auto 1fr;
      gap: 8px;
      align-items: end;
      margin-top: 12px;
    }

    .line-label {
      font-size: 12px;
      white-space: nowrap;
    }

    .line-input,
    .line-select,
    .line-static {
      border: none;
      border-bottom: 1px solid #000;
      min-height: 26px;
      font-size: 12px;
      padding: 0 4px 2px;
      background: transparent;
      outline: none;
      width: 100%;
    }

    .line-static {
      display: flex;
      align-items: end;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .line-select {
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #000 50%),
        linear-gradient(135deg, #000 50%, transparent 50%);
      background-position:
        calc(100% - 12px) calc(50% - 2px),
        calc(100% - 7px) calc(50% - 2px);
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      padding-right: 22px;
    }

    .occurrences-wrap {
      margin-top: 8px;
    }

    .occurrence-block {
      margin-top: 10px;
    }

    .occurrence-block + .occurrence-block {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px dashed #888;
    }

    .subtitle {
      font-size: 12px;
      margin-top: 10px;
      margin-bottom: 6px;
    }

    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 6px 0 10px;
      font-size: 12px;
    }

    .radio-group label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    .radio-group input[type="radio"] {
      width: 14px;
      height: 14px;
      accent-color: #000;
    }

    .sign-lines {
      margin-top: 16px;
    }

    .sign-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 10px;
      align-items: end;
    }

    .screen-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
      justify-content: center;
    }

    .screen-buttons button {
      min-width: 180px;
      min-height: 42px;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      background: #1d4ed8;
      color: #fff;
    }

    .screen-buttons button.secondary {
      background: #6b7280;
    }

    .print-area {
      display: none;
    }

    .print-page {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      background: #fff;
      padding: 0;
    }

    .print-form {
      width: 100%;
      background: #fff;
      border: 1px solid #bfbfbf;
      padding: 18px 16px 22px;
      margin-bottom: 10mm;
    }

    .print-page.double {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 4mm;
      padding: 0;
    }

    .print-page.double .print-form {
      flex: 1;
      padding: 10px 12px 12px;
      margin-bottom: 0;
      transform-origin: top left;
    }

    .print-page.double .sheet-header {
      grid-template-columns: 90px 1fr;
      gap: 12px;
      margin-bottom: 8px;
    }

    .print-page.double .sheet-header img {
      width: 78px;
      margin-left: 2px;
    }

    .print-page.double .sheet-title {
      font-size: 14px;
      margin-right: 20px;
    }

    .print-page.double .field-box {
      padding: 12px 8px 8px;
      margin-bottom: 8px;
    }

    .print-page.double .field-box-title {
      font-size: 11px;
      top: -8px;
    }

    .print-page.double .line-grid,
    .print-page.double .line-grid-2,
    .print-page.double .line-grid-3 {
      margin-top: 8px;
    }

    .print-page.double .line-label,
    .print-page.double .line-static,
    .print-page.double .subtitle,
    .print-page.double .radio-group {
      font-size: 11px;
    }

    .print-page.double .radio-group {
      gap: 12px;
      margin: 5px 0 8px;
    }

    .print-page.double .occurrence-block {
      margin-top: 6px;
    }

    .print-page.double .sign-lines {
      margin-top: 10px;
    }

    .print-page.double .sign-grid {
      gap: 10px;
      margin-top: 8px;
    }

    @page {
      size: A4 portrait;
      margin: 8mm;
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }

      .screen-panel {
        display: none !important;
      }

      .print-area {
        display: block !important;
      }
    }

    @media (max-width: 900px) {
      body {
        padding: 10px;
      }

      .top-actions {
        grid-template-columns: 1fr;
      }

      .form-sheet {
        padding: 14px 12px 18px;
      }

      .sheet-header {
        grid-template-columns: 1fr;
        justify-items: center;
        gap: 10px;
      }

      .sheet-title {
        margin-right: 0;
        font-size: 16px;
      }

      .line-grid-3,
      .line-grid-2,
      .sign-grid {
        grid-template-columns: 1fr;
      }

      .radio-group {
        gap: 12px;
      }

      .screen-buttons {
        flex-direction: column;
      }

      .screen-buttons button {
        width: 100%;
      }
    }
  </style>
</head>
<body>

    function somenteDigitos(valor) {
      return String(valor || "").replace(/\D/g, "");
    }

    function formatarCPF(valor) {
      const v = somenteDigitos(valor).slice(0, 11);
      if (!v) return "";
      return v
        .replace(/(\d{3})(\d)/, "$1.$2")
        .replace(/(\d{3})(\d)/, "$1.$2")
        .replace(/(\d{3})(\d{1,2})$/, "$1-$2");
    }

    function formatarDataBR(valor) {
      if (!valor) return "";
      const partes = valor.split("-");
      if (partes.length !== 3) return valor;
      return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

                  <div class="line-static">${document.getElementById("colaboradorSelect")?.selectedOptions?.[0]?.textContent !== "Selecionar colaborador" ? (document.getElementById("colaboradorSelect")?.selectedOptions?.[0]?.textContent || "") : ""}</div>
                </div>
                <div class="line-grid-3">
                  <div class="line-label">CARGO:</div>
                  <div class="line-static">${document.getElementById("cargoColaborador")?.value || ""}</div>
                  <div class="line-label">CPF:</div>
                  <div class="line-static">${document.getElementById("cpfColaborador")?.value || ""}</div>
                </div>
              </div>
            ` : ""}
            ${criarOcorrenciaHTML(i)}
            <div class="sign-lines">
              <div class="line-grid" style="margin-top:16px;">
                <div class="line-label">Assinatura do colaborador:</div>
                <div class="line-static"></div>
              </div>

              <div class="sign-grid">
                <div class="line-grid" style="margin-top:8px;">
                  <div class="line-label">Assinatura Líder:</div>
                  <div class="line-static"></div>
                </div>

                <div class="line-grid" style="margin-top:8px;">
                  <div class="line-label">Assinatura RH:</div>
                  <div class="line-static"></div>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      if (estado.quantidadeOcorrencias === 1) {
        container.innerHTML = html;
      } else {
        container.innerHTML = html;
      }
    }

    function popularSelectColaborador() {
      const select = document.getElementById("colaboradorSelect");
      select.innerHTML = '<option value="">Selecionar colaborador</option>';

      estado.funcionarios
        .slice()
        .sort((a, b) => a.nome.localeCompare(b.nome, "pt-BR"))
        .forEach((funcionario, idx) => {
          const option = document.createElement("option");
          option.value = String(idx);
          option.textContent = funcionario.nome;
          select.appendChild(option);
        });
    }

    function preencherDadosColaborador() {
      const select = document.getElementById("colaboradorSelect");
      const cargo = document.getElementById("cargoColaborador");
      const cpf = document.getElementById("cpfColaborador");

      if (!select.value) {
        cargo.value = "";
        cpf.value = "";
      } else {
        const funcionario = estado.funcionarios[Number(select.value)];
        cargo.value = funcionario?.cargo || "";
        cpf.value = formatarCPF(funcionario?.cpf || "");
      }

      if (estado.quantidadeOcorrencias === 2) {
        renderOcorrenciasTela();
      }
    }

    function atualizarEmpresaDuplicada() {
      if (estado.quantidadeOcorrencias === 2) {
        renderOcorrenciasTela();
      }
    }

    function coletarOcorrencias() {
      const ocorrencias = [];

      for (let i = 1; i <= estado.quantidadeOcorrencias; i++) {
        const data = document.querySelector(`.ocorrencia-data[data-indice="${i}"]`)?.value || "";
        const horario = document.querySelector(`.ocorrencia-horario[data-indice="${i}"]`)?.value || "";
        const justificativa = document.querySelector(`.ocorrencia-justificativa[data-indice="${i}"]`)?.value || "";
        const registro = document.querySelector(`input[name="registro_${i}"]:checked`)?.value || "";

        ocorrencias.push({
          data,
          horario,
          justificativa,
          registro
        });
      }

      return ocorrencias;
    }

    function validarAntesImprimir() {
      if (!document.getElementById("empresaSelect").value) {
        alert("Selecione o empregador.");
        return false;
      }

      if (!document.getElementById("colaboradorSelect").value) {
        alert("Selecione o colaborador.");
        return false;
      }

      const ocorrencias = coletarOcorrencias();

      for (let i = 0; i < ocorrencias.length; i++) {
        const item = ocorrencias[i];
        if (!item.data || !item.registro || !item.horario || !item.justificativa) {
          alert(`Preencha todos os campos da ocorrência ${i + 1}.`);
          return false;
        }
      }

      return true;
    }

    function montarFormularioBaseImpressao(empresa, colaborador, cargo, cpf, ocorrencia) {
      return `
        <div class="print-form">
          <div class="sheet-header">
            <img src="logo.png" alt="GDS Logística" />
            <div class="sheet-title">Correções e lançamentos manuais</div>
          </div>

          <div class="field-box">
            <div class="field-box-title">DADOS DO EMPREGADOR</div>
            <div class="line-grid">
              <div class="line-label">Razão Social:</div>
              <div class="line-static">${empresa}</div>
            </div>
            <div class="line-grid">
              <div class="line-label">Endereço:</div>
              <div class="line-static">${ENDERECO_FIXO}</div>
            </div>
          </div>

          <div class="field-box">
            <div class="field-box-title">DADOS DO TRABALHADOR</div>
            <div class="line-grid">
              <div class="line-label">NOME DO COLABORADOR:</div>
              <div class="line-static">${colaborador}</div>
            </div>
            <div class="line-grid-3">
              <div class="line-label">CARGO:</div>
              <div class="line-static">${cargo}</div>
              <div class="line-label">CPF:</div>
              <div class="line-static">${cpf}</div>
            </div>
          </div>

          <div class="occurrence-block">
            <div class="line-grid-2">
              <div class="line-label">Data Ocorrência:</div>
              <div class="line-static">${formatarDataBR(ocorrencia.data)}</div>
              <div></div>
              <div></div>
            </div>

            <div class="subtitle">Qual registro não foi marcado</div>
            <div class="radio-group">
              <label><input type="radio" ${ocorrencia.registro === "Entrada" ? "checked" : ""}> Entrada</label>
              <label><input type="radio" ${ocorrencia.registro === "Saída Intervalo" ? "checked" : ""}> Saída Intervalo</label>
              <label><input type="radio" ${ocorrencia.registro === "Retorno Intervalo" ? "checked" : ""}> Retorno Intervalo</label>
              <label><input type="radio" ${ocorrencia.registro === "Saída" ? "checked" : ""}> Saída</label>
            </div>

            <div class="line-grid-2">
              <div class="line-label">Horário devido da marcação:</div>
              <div class="line-static">${ocorrencia.horario || ""}</div>
              <div></div>
              <div></div>
            </div>

            <div class="line-grid">
              <div class="line-label">Justifique o motivo para a não marcação do ponto:</div>
              <div class="line-static">${ocorrencia.justificativa || ""}</div>
            </div>
          </div>

          <div class="sign-lines">
            <div class="line-grid" style="margin-top:16px;">
              <div class="line-label">Assinatura do colaborador:</div>
              <div class="line-static"></div>
            </div>

            <div class="sign-grid">
              <div class="line-grid" style="margin-top:8px;">
                <div class="line-label">Assinatura Líder:</div>
                <div class="line-static"></div>
              </div>

              <div class="line-grid" style="margin-top:8px;">
                <div class="line-label">Assinatura RH:</div>
                <div class="line-static"></div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function montarFormularioImpressao() {
      const empresa = document.getElementById("empresaSelect").value || "";
      const colaborador = document.getElementById("colaboradorSelect").selectedOptions[0]?.textContent || "";
      const cargo = document.getElementById("cargoColaborador").value || "";
      const cpf = document.getElementById("cpfColaborador").value || "";
      const ocorrencias = coletarOcorrencias();

      let html = "";

      if (estado.quantidadeOcorrencias === 1) {
        html = `
          <div class="print-page">
            ${montarFormularioBaseImpressao(empresa, colaborador, cargo, cpf, ocorrencias[0])}
          </div>
        `;
      } else {
        html = `
          <div class="print-page double">
            ${montarFormularioBaseImpressao(empresa, colaborador, cargo, cpf, ocorrencias[0])}
            ${montarFormularioBaseImpressao(empresa, colaborador, cargo, cpf, ocorrencias[1])}
          </div>
        `;
      }

      document.getElementById("formularioImpressao").innerHTML = html;
    }

    function limparFormulario() {
      document.getElementById("empresaSelect").value = "";
      document.getElementById("colaboradorSelect").value = "";
      document.getElementById("cargoColaborador").value = "";
      document.getElementById("cpfColaborador").value = "";
      document.getElementById("quantidadeOcorrencias").value = "1";
      estado.quantidadeOcorrencias = 1;
      renderOcorrenciasTela();
    }

    function iniciar() {
      popularSelectColaborador();
      renderOcorrenciasTela();

      document.getElementById("empresaSelect").addEventListener("change", atualizarEmpresaDuplicada);
      document.getElementById("colaboradorSelect").addEventListener("change", preencherDadosColaborador);

      document.getElementById("quantidadeOcorrencias").addEventListener("change", function() {
        estado.quantidadeOcorrencias = Number(this.value || 1);
        renderOcorrenciasTela();
      });

      document.getElementById("btnAtualizarTela").addEventListener("click", function() {
        estado.quantidadeOcorrencias = Number(document.getElementById("quantidadeOcorrencias").value || 1);
        renderOcorrenciasTela();
      });

      document.getElementById("btnLimparFormulario").addEventListener("click", limparFormulario);

      document.getElementById("btnImprimir").addEventListener("click", function() {
        if (!validarAntesImprimir()) return;
        montarFormularioImpressao();
        window.print();
      });

      document.getElementById("enderecoEmpregador").textContent = ENDERECO_FIXO;
    }

    document.addEventListener("DOMContentLoaded", iniciar);
  </script>
</body>
</html>
